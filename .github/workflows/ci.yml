name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: [devsesh, forge]
    defaults:
      run:
        working-directory: tools/${{ matrix.tool }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install
        run: uv sync --locked --group dev
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy .
      - name: Pytest
        run: |
          if ls tests/test_*.py >/dev/null 2>&1; then
            uv run pytest -q
          else
            echo "no tests for ${{ matrix.tool }} — skipping"
          fi
